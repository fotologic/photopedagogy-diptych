<title>PhotoPedagogy Diptych</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink: #CB216E;
  --text: #1c1c1a;
  --muted: #9a9690;
  --border: #e4e0da;
}
html, body { height: 100%; background: #fff; color: var(--text); font-family: 'Quicksand', sans-serif; }

.app { min-height: 100vh; display: flex; flex-direction: column; }

/* HEADER */
header { padding: 22px 36px; flex-shrink: 0; }
.wordmark a {
  font-family: 'Quicksand', sans-serif;
  font-size: 15px; font-weight: 700;
  letter-spacing: 0.07em; text-transform: uppercase;
  text-decoration: none; color: var(--text); transition: color 0.2s;
}
.wordmark a span { font-weight: 500; color: var(--muted); transition: color 0.2s; }
.wordmark a:hover, .wordmark a:hover span { color: var(--pink); }
.wordmark .tag {
  font-family: 'Quicksand', sans-serif;
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.14em; color: var(--muted);
  margin-left: 10px; text-transform: uppercase;
}

/* MAIN */
main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px 48px 28px; position: relative;
}

/* DIPTYCH */
.diptych {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 48px; width: 100%; max-width: 1160px; align-items: center;
}
.panel img {
  width: 100%; height: auto; max-height: 64vh;
  display: block; object-fit: contain;
  opacity: 0; transition: opacity 0.5s ease;
}
main.clickable { cursor: pointer; }
.panel img.visible { opacity: 1; }

/* LOADING */
.loading-msg {
  font-family: 'Quicksand', sans-serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--muted);
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none; white-space: nowrap;
}
.loading-msg.visible { opacity: 1; }

/* TC OVERLAY */
.overlay {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: min(720px, 90%);
  background: rgba(255, 246, 243, 0.95);
  box-shadow: 0 12px 48px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.06);
  padding: 52px 60px;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
.overlay.visible {
  opacity: 1;
  pointer-events: all;
}
.overlay-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 400;
  line-height: 1.8;
  color: #666;
  text-align: left;
}

/* WORD BUTTONS */
.word-area {
  flex-shrink: 0; padding: 20px 36px 28px;
  border-top: 1px solid var(--border);
  display: flex; flex-wrap: wrap;
  justify-content: center; gap: 8px;
}
.word-btn {
  font-family: 'Quicksand', sans-serif;
  font-size: 12px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: lowercase;
  padding: 9px 24px; background: none;
  border: 1px solid var(--border);
  color: var(--muted); cursor: pointer;
  border-radius: 20px; transition: all 0.18s;
  user-select: none;
}
.word-btn:hover { border-color: var(--pink); color: var(--pink); }
.word-btn.active { border-color: var(--pink); background: var(--pink); color: #fff; }
.word-btn.loading { opacity: 0.4; cursor: default; pointer-events: none; }

/* MOBILE */
@media (max-width: 700px) {
  header { padding: 18px 20px; }
  main { padding: 16px 20px 20px; }
  .diptych { grid-template-columns: 1fr; gap: 24px; }
  .panel img { max-height: 50vw; }
  .overlay { padding: 36px 28px; }
  .overlay-text { font-size: 14px; }
  .word-area { padding: 16px 20px 24px; gap: 6px; }
  .word-btn { font-size: 11px; padding: 8px 14px; }
}
</style>

const TC = {
  genre:       'Photography has many genres, some old, some borrowed, some new. Genre shapes expectations. Photographs are clothed in ‘rules’ and conventions that shape our expectations. Some are inherited from painting e.g. portraiture or landscape. Some have been created by photography e.g. photojournalism. They help to define how we look. Some photographers have fun playing with these expectations.',
  light:       'Photography is the capturing of light; a camera is optional. Photography is, literally, writing with light. Understanding how light behaves, how it falls, reflects, reveals, conceals, is not just technical knowledge but a way of seeing.',
  purpose:     'Photography is a hybrid kind of picture making, democratic and diverse. There’s a lot more to the story of photography than making art. Photographs serve a host of different functions from capturing smiles at family events to analysing a crime scene. Photography has always been a popular form of image-making but, nowadays, it’s almost ubiquitous.',
  selection:   'Photography is an art of selection rather than invention. Unlike painting or drawing, which start with blankness, photography starts with excess. The photographer’s task is not to add but to select from the chaos of the visible.',
  abstraction: 'Photographs are abstractions shaped by technology. Photographs look like the things they depict, but they are not those things. They are two-dimensional, static, bounded, and silent. The apparent transparency conceals how much they leave out. The seeming truth is always partial.',
  chance:      'Photographs rely on chance, more or less. Reality contains more information than you can control. It is not arranged for your benefit. And, just when you think you have everything organised, something enters the frame that you didn’t expect. You can combat chance, tolerate it or embrace it. To some extent, all photographs are the result of chance processes.',
  context:     'Photographs are not fixed in meaning; context is everything. Photographs are wild, indeterminate, multi-layered and unpredictable things. The meaning of a photograph is never fixed. It depends on context, caption, sequence, the viewer’s knowledge or sensitivity (and many more factors). Photographs resist the control of their makers.',
  form:        'Photographs have their own visual language and ‘grammar’. What’s in the frame implies what’s outside of it. Every photograph represents choices, of moment, angle, distance and timing. Those choices could have been made differently.',
  power:       'Photographs are not neutral; they are susceptible to the abuse of power. The camera is not innocent. Photography has been used to classify, surveil, objectify and control. Understanding this history is part of understanding the medium.',
  time:        'Photographs warp our sense of time; they remind us of things lost. Photographs have a special connection to what was once in front of the camera. Every photograph is a memento mori, a reminder that what the camera captured is already gone.',
};

const HISTORY_SIZE = 20;
let activeWord = null;
let hasImages = false;
let overlayVisible = false;
let isLoading = false;

function loadHistory(key) {
  try { return JSON.parse(sessionStorage.getItem(key) || '[]'); } catch(e) { return []; }
}
function saveHistory(key, arr) {
  try { sessionStorage.setItem(key, JSON.stringify(arr)); } catch(e) {}
}
function pickRandom(storageKey) {
  const history = loadHistory(storageKey);
  const histSet = new Set(history);
  const available = IMAGES.map((_,i) => i).filter(i => !histSet.has(i));
  const idx = available.length > 0
    ? available[Math.floor(Math.random() * available.length)]
    : Math.floor(Math.random() * IMAGES.length);
  history.push(idx);
  if (history.length > HISTORY_SIZE) history.shift();
  saveHistory(storageKey, history);
  return IMAGES[idx];
}

// Build buttons
const wordArea = document.getElementById('wordArea');
Object.keys(TC).forEach(word => {
  const btn = document.createElement('button');
  btn.className = 'word-btn';
  btn.textContent = word;
  btn.id = 'btn-' + word;
  btn.onclick = () => handleClick(word);
  wordArea.appendChild(btn);
});

function handleClick(word) {
  if (isLoading) return;

  if (word !== activeWord) {
    // New word: generate fresh pair
    activeWord = word;
    hasImages = false;
    setOverlay(false);
    document.querySelectorAll('.word-btn').forEach(b =>
      b.classList.toggle('active', b.id === 'btn-' + word));
    generate();
    return;
  }

  // Same word: always generate a new pair
  setOverlay(false);
  generate();
}

function setOverlay(show) {
  overlayVisible = show;
  if (show) {
    document.getElementById('overlayText').textContent = TC[activeWord];
    document.getElementById('overlay').classList.add('visible');
  } else {
    document.getElementById('overlay').classList.remove('visible');
  }
}

function generate() {
  isLoading = true;
  hasImages = false;
  setOverlay(false);
  document.getElementById('mainArea').classList.remove('clickable');
  document.querySelectorAll('.word-btn').forEach(b => b.classList.add('loading'));
  document.getElementById('loadingMsg').textContent = 'Loading';
  document.getElementById('loadingMsg').classList.add('visible');
  ['L','R'].forEach(s => document.getElementById('img'+s).classList.remove('visible'));

  // Pick two distinct files
  const fileL = pickRandom('dp_left');
  const pool = IMAGES.filter(f => f !== fileL);
  const fileR = pool[Math.floor(Math.random() * pool.length)];

  let done = 0;
  function onDone() {
    if (++done === 2) {
      isLoading = false;
      hasImages = true;
      document.getElementById('mainArea').classList.add('clickable');
      document.querySelectorAll('.word-btn').forEach(b => b.classList.remove('loading'));
      document.getElementById('loadingMsg').classList.remove('visible');
    }
  }

  [{s:'L', f:fileL},{s:'R', f:fileR}].forEach(({s, f}) => {
    const img = document.getElementById('img' + s);
    const tmp = new Image();
    tmp.onload = () => { img.src = tmp.src; requestAnimationFrame(() => img.classList.add('visible')); onDone(); };
    tmp.onerror = () => onDone();
    tmp.src = 'images/' + f;
  });
}

document.getElementById('mainArea').addEventListener('click', e => {
  // Don't interfere with word button clicks
  if (e.target.closest('.word-area')) return;
  if (isLoading) return;
  if (!activeWord) return;
  if (!hasImages) return;
  if (!overlayVisible) {
    setOverlay(true);
  } else {
    setOverlay(false);
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { setOverlay(false); return; }
  if ((e.key === ' ' || e.key === 'r') && activeWord && !isLoading) {
    e.preventDefault(); generate();
  }
});
