<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotoPedagogy Diptych</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink: #CB216E;
  --text: #1c1c1a;
  --muted: #9a9690;
  --border: #e4e0da;
}
html, body { height: 100%; background: #fff; color: var(--text); font-family: 'Nunito', sans-serif; }

.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header {
  padding: 22px 36px;
  flex-shrink: 0;
}
.wordmark a {
  font-family: 'Quicksand', sans-serif;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--text);
  transition: color 0.2s;
}
.wordmark a span { font-weight: 500; color: var(--muted); transition: color 0.2s; }
.wordmark a:hover { color: var(--pink); }
.wordmark a:hover span { color: var(--pink); }
.wordmark .tag {
  font-family: 'Quicksand', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  color: var(--muted);
  margin-left: 10px;
  text-transform: uppercase;
}

/* ── MAIN — images appear here, centered ── */
main {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 48px;
}

.diptych {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 48px;
  width: 100%;
  max-width: 1160px;
  align-items: center;
}

.loading-msg {
  font-family: 'Quicksand', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
.loading-msg.visible { opacity: 1; }
main { position: relative; }
.panel { display: flex; flex-direction: column; }

.panel img {
  width: 100%;
  height: auto;
  max-height: 65vh;
  display: block;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.panel img.visible { opacity: 1; }

.caption-area { display: none; }

/* ── WORD BUTTONS ── */
.word-area {
  flex-shrink: 0;
  padding: 24px 36px 32px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
}

.word-btn {
  font-family: 'Quicksand', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: lowercase;
  padding: 9px 24px;
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.18s;
}
.word-btn:hover { border-color: var(--pink); color: var(--pink); }
.word-btn.active { border-color: var(--pink); background: var(--pink); color: #fff; }
.word-btn.loading { opacity: 0.5; cursor: default; pointer-events: none; }

/* ── MOBILE ── */
@media (max-width: 700px) {
  header { padding: 18px 20px; }
  main { padding: 24px 20px; align-items: flex-start; }
  .diptych { grid-template-columns: 1fr; gap: 28px; }
  .word-area { padding: 20px 20px 28px; gap: 6px; }
  .word-btn { font-size: 11px; padding: 8px 16px; }
}

/* ── LIGHTBOX ── */
.lightbox {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 200;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: zoom-out;
  gap: 20px;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 92vw;
  max-height: 82vh;
  object-fit: contain;
  display: block;
}
.lightbox-caption {
  text-align: center;
  cursor: default;
}
.lightbox-caption .lc-title {
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
  line-height: 1.5;
}
.lightbox-caption .lc-meta {
  font-family: 'Nunito', sans-serif;
  font-size: 11.5px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  margin-top: 3px;
}
.lightbox-close {
  position: absolute;
  top: 18px;
  right: 24px;
  background: none;
  border: none;
  color: rgba(255,255,255,0.4);
  font-size: 30px;
  font-weight: 300;
  cursor: pointer;
  line-height: 1;
  padding: 4px 8px;
  display: none;
}
.lightbox.open .lightbox-close { display: block; }
.panel img { cursor: zoom-in; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="wordmark">
      <a href="https://www.photopedagogy.com" target="_blank">Photo<span>Pedagogy</span></a>
      <span class="tag">Diptych</span>
    </div>
  </header>

  <main>
    <div class="loading-msg" id="loadingMsg"></div>
    <div class="diptych" id="diptych">
      <div class="panel" id="panelL">
        <img id="imgL" src="" alt="">
        <div class="caption-area" id="capL"></div>
      </div>
      <div class="panel" id="panelR">
        <img id="imgR" src="" alt="">
        <div class="caption-area" id="capR"></div>
      </div>
    </div>
  </main>

  <div class="word-area" id="wordArea"></div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
    <div class="lightbox-caption" id="lightboxCaption" onclick="event.stopPropagation()"></div>
  </div>
</div>
<script>
const WORDS = {
  genre:       {},
  light:       {},
  purpose:     {},
  selection:   {},
  abstraction: {},
  chance:      {},
  context:     {},
  form:        {},
  power:       {},
  time:        {},
};

let activeWord = null;
let isLoading = false;

// Build buttons
const wordArea = document.getElementById('wordArea');
Object.keys(WORDS).forEach(word => {
  const btn = document.createElement('button');
  btn.className = 'word-btn';
  btn.textContent = word;
  btn.id = 'btn-' + word;
  btn.onclick = () => selectWord(word);
  wordArea.appendChild(btn);
});

function selectWord(word) {
  if (isLoading) return;
  activeWord = word;
  document.querySelectorAll('.word-btn').forEach(b => {
    b.classList.toggle('active', b.id === 'btn-' + word);
  });
  generate();
}

async function generate() {
  if (!activeWord || isLoading) return;
  isLoading = true;
  setAllLoading(true);

  ['L','R'].forEach(s => {
    document.getElementById('img'+s).classList.remove('visible');
    document.getElementById('cap'+s).innerHTML = '';
  });
  document.getElementById('loadingMsg').textContent = 'Loading';
  document.getElementById('loadingMsg').classList.add('visible');

  try {
    // Single call returns enough results to populate both panels
    const results = await fetchAICPair();
    if (results.length >= 2) {
      loadImage('L', results[0]);
      loadImage('R', results[1]);
    } else if (results.length === 1) {
      loadImage('L', results[0]);
    }
  } catch(e) {
    console.error('Fetch error:', e);
  }

  isLoading = false;
  setAllLoading(false);
  document.getElementById('loadingMsg').classList.remove('visible');
}

function setAllLoading(on) {
  document.querySelectorAll('.word-btn').forEach(b => b.classList.toggle('loading', on));
}

function loadImage(s, data, retries=2) {
  if (!data?.url) return;
  const img = document.getElementById('img' + s);
  const cap = document.getElementById('cap' + s);
  const newImg = new Image();
  newImg.onload = () => {
    img.src = newImg.src;
    img.alt = data.title || '';
    img.onclick = () => openLightbox(img.src, data);
    requestAnimationFrame(() => img.classList.add('visible'));
    cap.innerHTML = buildCaption(data);
  };
  newImg.onerror = async () => {
    if (retries > 0) {
      try {
        const results = await fetchAICPair();
        const replacement = results[s === 'L' ? 0 : 1];
        if (replacement) loadImage(s, replacement, retries - 1);
      } catch(e) {}
    }
  };
  newImg.src = data.url;
}

function buildCaption(d) {
  let h = '';
  if (d.title) h += `<div class="caption-title">${esc(d.title)}</div>`;
  const m = [d.artist, d.date].filter(Boolean).join(', ');
  if (m) h += `<div class="caption-meta">${esc(m)}</div>`;
  return h;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── AIC API — single call, returns two distinct photographs ──
async function fetchAICPair(tries=4) {
  for (let i=0; i<tries; i++) {
    try {
      const from = Math.floor(Math.random() * 3000);
      const r = await fetch('https://api.artic.edu/api/v1/artworks/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fields: ['id','title','image_id','artist_title','date_display','classification_titles'],
          query: {
            bool: {
              must: [
                { term: { classification_title: 'photograph' } }
              ],
              must_not: [
                { term: { subject_titles: 'Nude' } },
                { term: { subject_titles: 'Nudity' } },
                { term: { subject_titles: 'Erotica' } },
                { term: { subject_titles: 'Erotic' } },
                { term: { subject_titles: 'Pin-ups' } },
                { term: { subject_titles: 'Glamour' } },
                { term: { subject_titles: 'Seminude' } },
                { term: { subject_titles: 'Semi-nude' } },
                { term: { subject_titles: 'Bathing beauties' } },
                { term: { subject_titles: 'Corpses' } },
                { term: { subject_titles: 'Dead' } },
                { term: { subject_titles: 'Death' } },
                { term: { subject_titles: 'Casualties' } },
                { term: { subject_titles: 'Violence' } }
              ]
            }
          },
          size: 30,
          from
        })
      });
      const d = await r.json();
      const BLOCK = ['nude','naked','erotic','erotica','pornograph','pin-up','pinup','semi-nude','glamour','corpse','dead soldier','casualties'];
      const items = (d.data||[]).filter(x =>
        x.image_id &&
        !BLOCK.some(w => (x.title||'').toLowerCase().includes(w))
      );
      if (items.length < 2) continue;

      // Pick two distinct random items
      const idxA = Math.floor(Math.random() * items.length);
      let idxB;
      do { idxB = Math.floor(Math.random() * items.length); } while (idxB === idxA);

      return [items[idxA], items[idxB]].map(item => ({
        url: `https://www.artic.edu/iiif/2/${item.image_id}/full/600,/0/default.jpg`,
        title: item.title, artist: item.artist_title, date: item.date_display
      }));
    } catch(e) { if (i===tries-1) throw e; await sleep(400); }
  }
  return [];
}


function openLightbox(src, data) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxImg').alt = data.title || '';
  let cap = '';
  if (data.title) cap += `<div class="lc-title">${esc(data.title)}</div>`;
  const m = [data.artist, data.date].filter(Boolean).join(', ');
  if (m) cap += `<div class="lc-meta">${esc(m)}</div>`;
  document.getElementById('lightboxCaption').innerHTML = cap;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLightbox(); return; }
  if ((e.key===' '||e.key==='r') && activeWord && !isLoading) {
    e.preventDefault(); generate();
  }
});
</script>
</body>
</html>
